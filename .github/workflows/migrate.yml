name: Run DB Migrations

on:
  push:
    branches:
      - claude/generate-preview-Y7lCy

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force IPv4 (Supabase direct connection requires it)
        run: sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1 net.ipv6.conf.default.disable_ipv6=1

      - name: Run pending migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: node scripts/migrate.js
