name: Run Social Media Agent

on:
  schedule:
    # Mon/Wed/Fri at 7am LA time (UTC-7 PDT / UTC-8 PST — using UTC-7 for safety)
    - cron: '0 14 * * 1,3,5'
    # Tue/Thu at 12pm LA time
    - cron: '0 19 * * 2,4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  social-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run social media agent
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: node scripts/social-agent.js

      - name: Commit updated post history
        run: |
          git config user.name "social-agent[bot]"
          git config user.email "social-agent@shelfcheckapp.com"
          git add scripts/social-agent/post-history.json
          git diff --cached --quiet || git commit -m "chore: update social post history [skip ci]"
          git diff --cached --quiet || git push
